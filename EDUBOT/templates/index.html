<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduBot – SMS College Varanasi</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f1a;
      --surface:   #13162b;
      --card:      #1a1e35;
      --border:    #252a45;
      --accent:    #4f8ef7;
      --accent2:   #7c5cfc;
      --green:     #3dd68c;
      --text:      #e8eaf6;
      --muted:     #7b82a8;
      --bot-bubble:#1e2540;
      --user-bubble:linear-gradient(135deg, #4f8ef7, #7c5cfc);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(79,142,247,0.4);
    }
    .header-info h1 {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .header-info p {
      font-size: 12px;
      color: var(--green);
      display: flex; align-items: center; gap: 5px;
    }
    .header-info p::before {
      content: '';
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.5; transform:scale(1.3); }
    }
    .college-tag {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── CHAT WINDOW ── */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── BUBBLES ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.3s ease forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }

    .bubble-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .msg-row.user .bubble-avatar {
      background: linear-gradient(135deg, #3dd68c, #1fa8e0);
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-row.bot  .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .msg-row.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    /* quick-reply chips */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 13px;
      cursor: pointer;
      background: transparent;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .chip:hover {
      background: var(--accent);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79,142,247,0.3);
    }

    /* typing indicator */
    .typing-row { display:flex; align-items:flex-end; gap:8px; }
    .typing-bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform:translateY(0); }
      30%          { transform:translateY(-6px); background: var(--accent); }
    }

    /* ── INPUT BAR ── */
    #input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 12px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #user-input::placeholder { color: var(--muted); }
    #user-input:focus { border-color: var(--accent); }

    #send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(79,142,247,0.35);
    }
    #send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(79,142,247,0.5); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn svg { width:18px; height:18px; fill:#fff; }

    /* ── WELCOME CARD ── */
    .welcome-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 4px;
      text-align: center;
    }
    .welcome-card .logo { font-size: 36px; margin-bottom: 10px; }
    .welcome-card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .welcome-card p { font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>

  <header>
    <div class="avatar">🎓</div>
    <div class="header-info">
      <h1>EduBot</h1>
      <p>Online now</p>
    </div>
    <span class="college-tag">SMS College · Varanasi</span>
  </header>

  <div id="chat-window"></div>

  <div id="input-bar">
    <input id="user-input" type="text" placeholder="Type a message or press a number…" autocomplete="off"/>
    <button id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

<script>
// ── STATE MACHINE (mirrors EduBot.py logic) ──────────────────────────────────
let state = "new";
let userName = "";

const MAIN_MENU_TEXT =
  "1 → STUDENT SECTION\n" +
  "2 → FACULTY SECTION\n" +
  "3 → VISITOR SECTION\n" +
  "4 → MISCELLANEOUS SECTION\n" +
  "5 → EXIT";

const MAIN_MENU_CHIPS = ["1","2","3","4","5"];

function getBotReply(msg) {
  msg = msg.trim();
  const replies = [];

  if (state === "new") {
    state = "name_prompt";
    replies.push({ text: "Hi there! My name is EduBot 🎓\nI'm your Virtual Assistant for SMS College Varanasi!\n\nWhat's your name?" });
    return replies;
  }

  if (state === "name_prompt") {
    userName = msg;
    state = "menu";
    replies.push({
      text: `Hello ${userName}, how can I assist you today? 😊\n\n${MAIN_MENU_TEXT}`,
      chips: MAIN_MENU_CHIPS
    });
    return replies;
  }

  if (state === "menu") {
    if (msg === "1") {
      state = "student_level";
      replies.push({ text: "SELECT YOUR GRADUATION LEVEL:", chips: ["1 → UnderGraduation", "2 → PostGraduation"] });
    } else if (msg === "2") {
      state = "faculty_dept";
      replies.push({
        text: "CHOOSE YOUR DEPARTMENT:",
        chips: ["1 → Computer Applications","2 → Management","3 → Industrial","4 → International","5 → Academic"]
      });
    } else if (msg === "3") {
      state = "visitor_option";
      replies.push({
        text: "SELECT YOUR OPTION:",
        chips: ["1 → Admission","2 → Examination","3 → Placement","4 → Contact Us","5 → About EduBot"]
      });
    } else if (msg === "4") {
      state = "misc_option";
      replies.push({
        text: "SELECT YOUR OPTION:",
        chips: ["1 → Exam Fees","2 → Scholarship","3 → Hostel Fees","4 → SMS Law College"]
      });
    } else if (msg === "5") {
      state = "new";
      userName = "";
      replies.push({ text: `THANK YOU for connecting with us! Have a great day! 👋\n\nSend any message to start again.` });
    } else {
      replies.push({ text: `Invalid option. Please choose 1–5:\n\n${MAIN_MENU_TEXT}`, chips: MAIN_MENU_CHIPS });
    }
    return replies;
  }

  if (state === "student_level") {
    if (msg === "1") {
      state = "student_ug";
      replies.push({
        text: "UNDERGRADUATION COURSES:",
        chips: ["1 → BBA","2 → BCA","3 → BA-HONS","4 → B.COM","5 → B.COM-HONS","6 → BA-LLB"]
      });
    } else if (msg === "2") {
      state = "student_pg";
      replies.push({ text: "POSTGRADUATION COURSES:", chips: ["1 → MBA","2 → MCA","3 → M.COM"] });
    } else {
      replies.push({ text: "Invalid option. Enter 1 for UG or 2 for PG.", chips: ["1 → UnderGraduation","2 → PostGraduation"] });
    }
    return replies;
  }

  if (state === "student_ug") {
    const courses = {
      "1": ["BBA",        "https://www.smsvaranasi.com/bba.html"],
      "2": ["BCA",        "https://www.smsvaranasi.com/bca.html"],
      "3": ["BA-HONS",    "https://www.smsvaranasi.com/bahonsmasscomm.html"],
      "4": ["B.COM",      "https://www.smsvaranasi.com/bcom.html"],
      "5": ["B.COM-HONS", "https://www.smsvaranasi.com/bcomhons.html"],
      "6": ["BA-LLB",     "http://smslawcollege.com/ba-llb.html"],
    };
    if (courses[msg]) {
      const [name, url] = courses[msg];
      replies.push({ text: `✅ ${name} details:\n${url}\n\nThank you for connecting with us!` });
      state = "menu";
      replies.push({ text: `Back to Main Menu:\n\n${MAIN_MENU_TEXT}`, chips: MAIN_MENU_CHIPS });
    } else {
      replies.push({ text: "Invalid option. Please select 1–6.", chips: ["1 → BBA","2 → BCA","3 → BA-HONS","4 → B.COM","5 → B.COM-HONS","6 → BA-LLB"] });
    }
    return replies;
  }

  if (state === "student_pg") {
    const courses = {
      "1": ["MBA",   "https://www.smsvaranasi.com/mba.html"],
      "2": ["MCA",   "https://www.smsvaranasi.com/mca.html"],
      "3": ["M.COM", "https://www.smsvaranasi.com/mcom.html"],
    };
    if (courses[msg]) {
      const [name, url] = courses[msg];
      replies.push({ text: `✅ ${name} details:\n${url}\n\nThank you for connecting with us!` });
      state = "menu";
      replies.push({ text: `Back to Main Menu:\n\n${MAIN_MENU_TEXT}`, chips: MAIN_MENU_CHIPS });
    } else {
      replies.push({ text: "Invalid option. Please select 1–3.", chips: ["1 → MBA","2 → MCA","3 → M.COM"] });
    }
    return replies;
  }

  if (state === "faculty_dept") {
    const depts = {
      "1": "COMPUTER APPLICATIONS FACULTIES:\n1. Dr. Kamal Sheel Mishra (HoD)\n   🔗 https://www.smsvaranasi.com/view-faculty-details/40.html\n2. Mr. Shambhu Sharan Srivastava\n   🔗 https://www.smsvaranasi.com/view-faculty-details/41.html\n3. Mr. Anand Prakash Dubey\n   🔗 https://www.smsvaranasi.com/view-faculty-details/42.html\n4. Mr. Ram Gopal Gupta\n   🔗 https://www.smsvaranasi.com/view-faculty-details/43.html\n5. Dr. Aditya Kumar Gupta\n   🔗 https://www.smsvaranasi.com/view-faculty-details/44.html",
      "2": "MANAGEMENT FACULTIES:\n1. Prof. Pinak Nath Jha (Director)\n   🔗 https://www.smsvaranasi.com/view-faculty-details/1.html\n2. Mr. Sandeep Singh\n   🔗 https://www.smsvaranasi.com/view-faculty-details/2.html\n3. Dr. Raj Kumar Singh\n   🔗 https://www.smsvaranasi.com/view-faculty-details/3.html\n4. Dr. Sanjay Saxena\n   🔗 https://www.smsvaranasi.com/view-faculty-details/4.html",
      "3": "VISITING FACULTIES INDUSTRIAL:\n- Mr. Yogesh Kumar (Ex. VP-HR, Bhartiya International)\n- Mr. K. Gopal (VP Finance, Price Water House Coopers)\n- Mr. Alok Agrawal (Ex. Executive Director, Polar Industries)\n- Mr. Ramesh Singh (Technical Director, NIC, New Delhi)\n- Mr. Rajeev Chandola (Head-HR & Admin, ColdEx)\n- Mr. B. Sudhakar (Head-HR, Tata Chemicals)",
      "4": "VISITING FACULTIES INTERNATIONAL:\n- Prof. Benjamin Yumol, Claffin University, USA\n- Prof. Roberto Biloslavo, University of Primoska, Slovenia\n- Mr. Arun Kumar, Sr. Manager, Hanson, Australia\n- Dr. Harriet Nettles, Educational Psychologist, USA\n- Prof. Michael De Wilde, Grand Valley State University, USA\n- Prof. Graham Ward, Director, INSEAD, France",
      "5": "VISITING FACULTIES ACADEMIC:\n- Prof. S.K. Kak, Former VC, Mahamaya Technical University\n- Prof. M.S. Lakshmi, ICFAI, Gurgaon\n- Dr. Reena Shrivastava, Lucknow University\n- Prof. H. Karnik, IIT Kanpur\n- Prof. S.K. Singh, FMS BHU Varanasi\n- Prof. Atul Tandon, Former Director-MICA, Ahmedabad",
    };
    if (depts[msg]) {
      replies.push({ text: depts[msg] });
      state = "menu";
      replies.push({ text: `Back to Main Menu:\n\n${MAIN_MENU_TEXT}`, chips: MAIN_MENU_CHIPS });
    } else {
      replies.push({ text: "Invalid option. Please enter 1–5.", chips: ["1 → Computer Applications","2 → Management","3 → Industrial","4 → International","5 → Academic"] });
    }
    return replies;
  }

  if (state === "visitor_option") {
    if (msg === "1") {
      state = "visitor_admission";
      replies.push({ text: "ADMISSION OPTIONS:", chips: ["1 → UG Level","2 → PG Level","3 → Admission Process"] });
    } else if (msg === "2") {
      replies.push({ text: "EXAMINATION PORTAL:\n🔗 https://examination.smsvaranasi.com/" });
      state = "menu";
      replies.push({ text: `Back to Main Menu:\n\n${MAIN_MENU_TEXT}`, chips: MAIN_MENU_CHIPS });
    } else if (msg === "3") {
      state = "visitor_placement";
      replies.push({ text: "PLACEMENT PORTAL:", chips: ["1 → Placement Cell","2 → Process","3 → Track Record","4 → Recruiters","5 → Current Year"] });
    } else if (msg === "4") {
      replies.push({ text: "CONTACT US:\n🔗 https://www.smsvaranasi.com/contact-us.html" });
      state = "menu";
      replies.push({ text: `Back to Main Menu:\n\n${MAIN_MENU_TEXT}`, chips: MAIN_MENU_CHIPS });
    } else if (msg === "5") {
      replies.push({ text: `ABOUT EDUBOT 🤖\nDeveloped by 4 members from SMS College Varanasi:\n- Sumit Kumar\n- Anand Gupta\n- Atul Mishra\n- Vivek Raghuvanshi\n\nTHANK YOU, ${userName}! Have a nice day! 😊` });
      state = "menu";
      replies.push({ text: `Back to Main Menu:\n\n${MAIN_MENU_TEXT}`, chips: MAIN_MENU_CHIPS });
    } else {
      replies.push({ text: "Invalid option. Please enter 1–5.", chips: ["1 → Admission","2 → Examination","3 → Placement","4 → Contact Us","5 → About EduBot"] });
    }
    return replies;
  }

  if (state === "visitor_admission") {
    const opts = {
      "1": ["UG Admission",      "https://online.smsvaranasi.com/apply/index.php"],
      "2": ["PG Admission",      "https://online.smsvaranasi.com/apply/index.php"],
      "3": ["Admission Process", "https://online.smsvaranasi.com/"],
    };
    if (opts[msg]) {
      const [label, url] = opts[msg];
      replies.push({ text: `✅ ${label}:\n🔗 ${url}` });
      state = "menu";
      replies.push({ text: `Back to Main Menu:\n\n${MAIN_MENU_TEXT}`, chips: MAIN_MENU_CHIPS });
    } else {
      replies.push({ text: "Invalid option. Please select 1, 2, or 3.", chips: ["1 → UG Level","2 → PG Level","3 → Admission Process"] });
    }
    return replies;
  }

  if (state === "visitor_placement") {
    const opts = {
      "1": ["Placement Cell",         "https://www.smsvaranasi.com/training-placement-cell.html"],
      "2": ["Placement Process",      "https://www.smsvaranasi.com/placement-process.html"],
      "3": ["Placement Track Record", "https://www.smsvaranasi.com/placement-track-record.html"],
      "4": ["Placement Recruiters",   "https://www.smsvaranasi.com/list-of-recruiters.html"],
      "5": ["Current Year Placement", "https://www.smsvaranasi.com/current-year-placement.html"],
    };
    if (opts[msg]) {
      const [label, url] = opts[msg];
      replies.push({ text: `✅ ${label}:\n🔗 ${url}` });
      state = "menu";
      replies.push({ text: `Back to Main Menu:\n\n${MAIN_MENU_TEXT}`, chips: MAIN_MENU_CHIPS });
    } else {
      replies.push({ text: "Invalid option. Please select 1–5.", chips: ["1 → Placement Cell","2 → Process","3 → Track Record","4 → Recruiters","5 → Current Year"] });
    }
    return replies;
  }

  if (state === "misc_option") {
    const opts = {
      "1": ["Examination Fee Portal", "https://epay.smsvaranasi.com/"],
      "2": ["Scholarship Portal",     "https://www.smsvaranasi.com/sms-scholarship-form.html"],
      "3": ["Hostel Portal",          "https://www.smsvaranasi.com/hostel-requistion-form.html"],
      "4": ["SMS Law College",        "http://smslawcollege.com/"],
    };
    if (opts[msg]) {
      const [label, url] = opts[msg];
      replies.push({ text: `✅ ${label}:\n🔗 ${url}\n\nTHANK YOU, ${userName}, for connecting with us!` });
      state = "menu";
      replies.push({ text: `Back to Main Menu:\n\n${MAIN_MENU_TEXT}`, chips: MAIN_MENU_CHIPS });
    } else {
      replies.push({ text: "Invalid option. Please select 1–4.", chips: ["1 → Exam Fees","2 → Scholarship","3 → Hostel Fees","4 → SMS Law College"] });
    }
    return replies;
  }

  replies.push({ text: "Send any message to start!", chips: [] });
  return replies;
}

// ── UI HELPERS ───────────────────────────────────────────────────────────────
const chatWindow = document.getElementById("chat-window");
const userInput  = document.getElementById("user-input");
const sendBtn    = document.getElementById("send-btn");

function extractNumber(text) {
  const m = text.match(/^(\d+)/);
  return m ? m[1] : text;
}

function addMessage(who, text, chips) {
  const row = document.createElement("div");
  row.className = `msg-row ${who}`;

  const av = document.createElement("div");
  av.className = "bubble-avatar";
  av.textContent = who === "bot" ? "🎓" : "🧑";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  if (chips && chips.length) {
    const chipWrap = document.createElement("div");
    chipWrap.className = "chips";
    chips.forEach(c => {
      const btn = document.createElement("button");
      btn.className = "chip";
      btn.textContent = c;
      btn.onclick = () => handleSend(extractNumber(c));
      chipWrap.appendChild(btn);
    });
    bubble.appendChild(chipWrap);
  }

  row.appendChild(av);
  row.appendChild(bubble);
  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "typing-row";
  row.id = "typing";
  const av = document.createElement("div");
  av.className = "bubble-avatar";
  av.textContent = "🎓";
  const bub = document.createElement("div");
  bub.className = "typing-bubble";
  bub.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(av);
  row.appendChild(bub);
  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

function handleSend(overrideMsg) {
  const msg = overrideMsg !== undefined ? String(overrideMsg) : userInput.value.trim();
  if (!msg) return;

  addMessage("user", msg);
  userInput.value = "";

  showTyping();
  setTimeout(() => {
    hideTyping();
    const replies = getBotReply(msg);
    replies.forEach((r, i) => {
      setTimeout(() => addMessage("bot", r.text, r.chips || []), i * 400);
    });
  }, 700);
}

sendBtn.addEventListener("click", () => handleSend());
userInput.addEventListener("keydown", e => { if (e.key === "Enter") handleSend(); });

// ── INIT ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  setTimeout(() => {
    const replies = getBotReply("__init__");
    replies.forEach((r, i) => {
      setTimeout(() => addMessage("bot", r.text, r.chips || []), i * 500 + 400);
    });
  }, 300);
};
</script>
